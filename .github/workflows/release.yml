name: Release and Deploy

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+-release'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode - test workflow without publishing'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 验证标签版本与代码版本一致
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches code version
        id: check
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/}
            TAG_VERSION=${TAG_VERSION%-release}
          else
            TAG_VERSION=""
          fi
          CODE_VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pyproject.toml)

          echo "Tag version: $TAG_VERSION"
          echo "Code version: $CODE_VERSION"

          if [[ -n "$TAG_VERSION" && "$TAG_VERSION" != "$CODE_VERSION" ]]; then
            echo "❌ Version mismatch!"
            echo "Tag: $TAG_VERSION, Code: $CODE_VERSION"
            exit 1
          fi

          echo "✅ Version check passed: $CODE_VERSION"
          echo "version=$CODE_VERSION" >> $GITHUB_OUTPUT

  # 运行测试套件
  test:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pillow charset-normalizer

      - name: Run tests
        run: python setup.py tests-preinstall

  # 构建和发布 (正式发布)
  build-and-publish:
    needs: [check-version, test]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run != 'true' }}
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: dist/*

  # 构建 (Dry Run 模式)
  build-dry-run:
    needs: [check-version, test]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.dry_run == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Dry run complete
        run: |
          echo "🏃 Dry run mode - build completed"
          echo "Wheel and sdist files are available as artifacts"
