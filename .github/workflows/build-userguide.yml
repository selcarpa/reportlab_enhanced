name: Build and Deploy User Guide

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install project
        run: |
          uv venv
          uv pip install -e .

      - name: Convert chapters to Markdown (English)
        run: uv run python docs/userguide_web/py2md.py

      - name: Convert chapters to Markdown (Chinese)
        run: uv run python docs/userguide_web/py2md.py --zh-CN

      - name: Install MkDocs and build site
        run: |
          uv sync
          uv run python build.py
        working-directory: docs/userguide_web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/userguide_web/site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
