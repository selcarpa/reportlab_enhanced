name: Build User Guide

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install project
        run: |
          uv venv
          uv pip install -e .

      - name: Convert chapters to Markdown (English)
        run: uv run python docs/userguide_web/py2md.py

      - name: Convert chapters to Markdown (Chinese)
        run: uv run python docs/userguide_web/py2md.py --zh-CN

      - name: Install MkDocs and build site
        run: |
          uv sync
          uv run python build.py
        working-directory: docs/userguide_web

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reportlab-userguide
          path: docs/userguide_web/site/
          retention-days: 30
